<!doctype html>
<html lang="en" class="dark">
  <head>
    <!-- Aplica el tema guardado ANTES del primer paint para evitar flash
         (light <-> dark). El default es dark. El Context luego toma el control. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var isDark = t !== 'light_mode'
          document.documentElement.classList.toggle('dark', isDark)
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/code.svg" />
    <link rel="stylesheet" href="./assets/output.css" />

    <!-- Pixel-art font para el juego (carga NO bloqueante: no frena el
         primer render; el texto aparece con la fuente del sistema y cambia
         a la pixel cuando termina de bajar). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      />
    </noscript>

    <!-- Primary Meta Tags -->
    <title>Max Portfolio - Developer</title>
    <meta name="title" content="Max Portfolio - Developer" />
    <meta
      name="description"
      content="Building innovative software solutions and robust network systems"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://maxi-andres.github.io/portfolio.dev/"
    />
    <meta property="og:title" content="Portfolio" />
    <meta
      property="og:description"
      content="Building innovative software solutions and robust network systems"
    />
    <meta
      property="og:image"
      content="https://maxi-andres.github.io/portfolio.dev/preview-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://maxi-andres.github.io/portfolio.dev/"
    />
    <meta property="twitter:title" content="Portfolio" />
    <meta
      property="twitter:description"
      content="Building innovative software solutions and robust network systems"
    />
    <meta
      property="twitter:image"
      content="https://maxi-andres.github.io/portfolio.dev/preview-image.png"
    />

    <!-- WhatsApp optimizado -->
    <meta property="og:site_name" content="Max Portfolio" />
    <meta property="og:locale" content="es_ES" />

    <title>Max Portfolio</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
